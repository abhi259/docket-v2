<svg
  width="32"
  height="32"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="bgGradient"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
      gradientUnits="objectBoundingBox"
    >
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
  </defs>

  <!-- Background to mimic sidebar logo container -->
  <rect x="0" y="0" width="24" height="24" rx="6" fill="url(#bgGradient)" />

  <!-- Burger icon in white, matching in-app logo -->
  <!-- Top bun -->
  <path
    d="M4 11c0-3.5 3.5-6 8-6s8 2.5 8 6H4z"
    stroke="#FFFFFF"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Sesame seeds -->
  <ellipse cx="8" cy="8" rx="0.8" ry="0.4" fill="#FFFFFF" />
  <ellipse cx="12" cy="6.5" rx="0.8" ry="0.4" fill="#FFFFFF" />
  <ellipse cx="16" cy="8" rx="0.8" ry="0.4" fill="#FFFFFF" />
  <!-- Lettuce -->
  <path
    d="M3 12.5c1.5 1 3-0.5 4.5 0.5s3-0.5 4.5 0.5 3-0.5 4.5 0.5 3-0.5 4.5 0.5"
    stroke="#FFFFFF"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Patty -->
  <rect
    x="4"
    y="14"
    width="16"
    height="3"
    rx="1.5"
    stroke="#FFFFFF"
    stroke-width="1.5"
    fill="none"
  />
  <!-- Bottom bun -->
  <path
    d="M4 18h16c0 1.5-3.5 2.5-8 2.5S4 19.5 4 18z"
    stroke="#FFFFFF"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
